<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>nylamysert - Login</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
</head>
<body>
  <header class="navbar">
    <div class="container nav-inner">
      <a class="brand" href="index.html">
        <img src="images/logo.svg" alt="nylamysert logo" class="logo">
        <span class="brand-text">nylamysert</span>
      </a>
      <button class="menu-toggle" aria-label="Toggle menu">☰</button>
      <nav class="nav">
        <ul>
          <li><a href="menu.html">Menu</a></li>
          <li><a href="harga.html">Harga</a></li>
          <li><a href="lokasi.html">Lokasi</a></li>
          <li><a href="notelp.html">No Telp</a></li>
          <li><a href="riwayat.html">Riwayat</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <div class="content container">
      <section class="hero">
        <h1>Masuk ke Akun Anda</h1>
        <p>Login untuk mengakses menu, mengajukan pesanan, dan melihat riwayat.</p>
      </section>
      <section class="section">
        <form class="login-form" id="loginForm">
          <label>
            Nama pengguna
            <input type="text" name="username" placeholder="Masukkan nama Anda" autocomplete="username" required>
          </label>
          <label>
            Kata sandi
            <input type="password" name="password" placeholder="Masukkan kata sandi" autocomplete="current-password" required>
          </label>
          <button type="submit">Login</button>
          <p class="login-message"></p>
          <p class="login-note">Gunakan sembarang nama dan kata sandi sederhana. Ini login klien sederhana tanpa server.</p>
        </form>
      </section>
    </div>
  </main>

  <script src="script.js"></script>
  <script>
  // Redirect jika sudah login
  if (isLoggedIn()) {
    window.location.href = 'menu.html';
  }

  const loginForm = document.getElementById('loginForm');
  const usernameInput = loginForm.querySelector('input[name="username"]');
  const passwordInput = loginForm.querySelector('input[name="password"]');
  const message = document.querySelector('.login-message');

  loginForm.addEventListener('submit', async event => {
    event.preventDefault();
    const username = usernameInput.value.trim();
    const password = passwordInput.value.trim();

    // Reset message
    message.textContent = '';
    message.style.color = '';

    // Validasi input
    if (!username) {
      message.textContent = 'Masukkan nama pengguna.';
      message.style.color = '#cc3300';
      usernameInput.focus();
      return;
    }

    if (!password) {
      message.textContent = 'Masukkan kata sandi.';
      message.style.color = '#cc3300';
      passwordInput.focus();
      return;
    }

    if (username.length < 3) {
      message.textContent = 'Nama pengguna minimal 3 karakter.';
      message.style.color = '#cc3300';
      usernameInput.focus();
      return;
    }

    if (password.length < 3) {
      message.textContent = 'Kata sandi minimal 3 karakter.';
      message.style.color = '#cc3300';
      passwordInput.focus();
      return;
    }

    // Simulasi proses login (bisa diganti dengan API call)
    try {
      message.textContent = 'Memproses login...';
      message.style.color = '#666';

      // Disable button saat proses
      const submitBtn = loginForm.querySelector('button[type="submit"]');
      submitBtn.disabled = true;
      submitBtn.textContent = 'Memproses...';

      // Simulasi delay
      await new Promise(resolve => setTimeout(resolve, 500));

      // Set auth data
      setAuthData(username, password);

      message.textContent = 'Login berhasil! Mengalihkan...';
      message.style.color = '#1f5e37';

      // Redirect setelah 1 detik
      setTimeout(() => {
        window.location.href = 'menu.html';
      }, 1000);
    } catch (error) {
      message.textContent = 'Terjadi kesalahan. Silakan coba lagi.';
      message.style.color = '#cc3300';
      const submitBtn = loginForm.querySelector('button[type="submit"]');
      submitBtn.disabled = false;
      submitBtn.textContent = 'Login';
    }
  });

  // Clear pesan error ketika user mulai mengetik
  usernameInput.addEventListener('input', () => {
    if (message.textContent) {
      message.textContent = '';
      message.style.color = '';
    }
  });

  passwordInput.addEventListener('input', () => {
    if (message.textContent) {
      message.textContent = '';
      message.style.color = '';
    }
  });
  </script>
</body>
</html>
